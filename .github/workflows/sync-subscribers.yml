name: Sync Email Subscribers
on:
  # Run daily at 4:00 AM UTC (midnight ET, well before ETL at 9 AM ET)
  schedule:
    - cron: '0 4 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync-subscribers:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Pull latest changes
      run: |
        git pull origin main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

    - name: Sync subscribers from Google Form
      env:
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        GOOGLE_FORM_SHEET_ID: ${{ secrets.GOOGLE_FORM_SHEET_ID }}
      run: |
        python scripts/utilities/sync_email_subscribers.py
        echo "✅ Subscriber list updated locally (not committed for privacy)"
