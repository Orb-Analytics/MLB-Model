name: MLB XGB Predictions

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Prediction date (YYYY-MM-DD). Leave blank for today.'
        required: false
        type: string

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy xgboost scikit-learn

    - name: Run XGB model
      run: |
        if [ -n "${{ inputs.target_date }}" ]; then
          python modeling/mlb_xgb_ml/mlb_xgb_ml.py "${{ inputs.target_date }}"
        else
          python modeling/mlb_xgb_ml/mlb_xgb_ml.py
        fi

    - name: Send predictions email
      env:
        GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python modeling/mlb_xgb_ml/send_predictions.py

    - name: Commit predictions
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add modeling/mlb_xgb_ml/predictions/
        git diff --staged --quiet || git commit -m "Add XGB predictions for $(date -u +%Y-%m-%d)"
        git push
