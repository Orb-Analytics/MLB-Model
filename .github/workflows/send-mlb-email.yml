name: Send MLB Predictions Email

on:
  # Trigger after predictions workflow completes
  workflow_run:
    workflows: ["MLB XGB Predictions"]
    types: [completed]
  
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send in test mode (only to Gmail address)'
        required: false
        type: boolean
        default: true

jobs:
  send-email:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy

    - name: Send MLB predictions email
      env:
        GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: |
        if [ "${{ github.event.inputs.test_mode }}" = "false" ]; then
          echo "📧 Running in PRODUCTION mode (manual trigger, test_mode unchecked)..."
          python modeling/email_mlb_predictions.py
        elif [ "${{ github.event_name }}" = "workflow_run" ]; then
          echo "📧 Running in PRODUCTION mode (automatic trigger)..."
          python modeling/email_mlb_predictions.py
        else
          echo "🧪 Running in TEST mode (manual trigger, test_mode checked or default)..."
          python modeling/email_mlb_predictions.py --test-mode
        fi

    - name: Commit updated records
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase
        git add data/mlb_todays_picks.csv
        git add data/mlb_season_record.csv 2>/dev/null || true
        git add data/mlb_detailed_picks_tracking.csv 2>/dev/null || true
        git diff --staged --quiet || git commit -m "Update MLB picks and season record for $(date -u +%Y-%m-%d)"
        git push
      continue-on-error: true
