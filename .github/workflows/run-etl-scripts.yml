name: Run ETL Pipeline

on:
  workflow_run:
    workflows: ["Run Selected Notebooks"]
    types:
      - completed
  workflow_dispatch:

jobs:
  etl:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run transform_matchups.py
        run: |
          echo "▶️ Running transform_matchups.py"
          python src/etl/transform_matchups.py

      - name: Run remaining ETL scripts
        run: |
          echo "▶️ Running remaining ETL scripts"
          for script in $(ls src/etl/*.py | grep -v transform_matchups.py | sort); do
            echo "▶️ Running $script"
            python "$script"
          done

      - name: Check for CSV changes
        id: git-check
        run: |
          git add data/**/*.csv processed/**/*.csv training-data/**/*.csv
          git diff --cached --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push new CSVs
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "🤖 Update CSVs from scheduled ETL run"
          git push
