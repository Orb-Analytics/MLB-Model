name: Run ETL Workflow

on:
  workflow_run:
    workflows: ["Run Selected Notebooks"]
    types:
      - completed
  workflow_dispatch:  # ⬅️ Manual trigger support

jobs:
  etl:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Step 1 - Transform Scores
      run: python src/etl/transform_scores.py

    - name: Step 2 - Add Scores to Training Set
      run: python src/etl/add_scores.py

    - name: Step 3 - Generate Matchups
      run: python src/etl/generate_matchups.py

    - name: Step 4 - Transform Starting Pitchers
      run: python src/etl/transform_starting_pitchers.py

    - name: Step 5 - Generate Team Pitching
      run: python src/etl/generate_team_pitching.py

    - name: Step 6 - Generate Team Batting
      run: python src/etl/generate_team_batting.py

    - name: Step 7 - Build Final Dataset
      run: python training-data/dataset.py

    - name: Commit and Push CSV Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add processed/**/*.csv training-data/**/*.csv
        git diff --cached --quiet || (git commit -m "🤖 Update ETL data pipeline output" && git push)
