name: Run ETL Workflow

on:
  workflow_run:
    workflows: ["Run Selected Notebooks"]
    types:
      - completed
      
  workflow_dispatch:  # ⬅️ Manual trigger support

jobs:
  etl:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Step 1 - Transform Scores
      run: python src/etl/transform_scores.py

    - name: Step 2 - Add Scores to Training Set
      run: python src/etl/add_scores.py

    - name: Step 3 - Generate Matchups
      run: python src/etl/generate_matchups.py

    - name: Step 4 - Transform Starting Pitchers
      run: python src/etl/transform_starting_pitchers.py

    - name: Step 5 - Generate Team Pitching
      run: python src/etl/generate_team_pitching.py

    - name: Step 6 - Generate Team Batting
      run: python src/etl/generate_team_batting.py

    - name: Step 7 - Build Final Dataset
      run: python training-data/dataset.py

    - name: Commit and Push CSV Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add processed/**/*.csv training-data/**/*.csv
        git diff --cached --quiet || (git commit -m "🤖 Update ETL data pipeline output" && git push)

    - name: Email Daily Dataset to Coworker
      env:
        GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: |
        python - <<EOF
import smtplib
import ssl
from email.message import EmailMessage
from datetime import datetime
from pathlib import Path
from zoneinfo import ZoneInfo

# Date for file naming (PST)
today = datetime.now(ZoneInfo("America/Los_Angeles")).date()
date_str = today.isoformat()

# File paths
daily_file = f"training-data/dataset/full_dataset_{date_str}.csv"
master_file = "training-data/training-set/training-set.csv"

# Email content
msg = EmailMessage()
msg['Subject'] = f"📊 MLB Data Files - {date_str}"
msg['From'] = "${{ secrets.GMAIL_USERNAME }}"
msg['To'] = "eborsook@gmail.com"
msg.set_content(f'''
Hi Ben,

Attached are today's MLB data files:

• full_dataset_{date_str}.csv
• training-set.csv (updated master dataset)

- Liam
''')

# Attach both files
for file_path in [daily_file, master_file]:
    with open(file_path, 'rb') as f:
        data = f.read()
        msg.add_attachment(data, maintype='application', subtype='octet-stream', filename=Path(file_path).name)

# Send email via Gmail SMTP
context = ssl.create_default_context()
with smtplib.SMTP_SSL("smtp.gmail.com", 465, context=context) as server:
    server.login("${{ secrets.GMAIL_USERNAME }}", "${{ secrets.GMAIL_APP_PASSWORD }}")
    server.send_message(msg)
EOF
