name: Daily MLB ETL

on:
  schedule:
    - cron: '0 13 * * *'  # 9 AM ET (13:00 UTC) daily

  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD). Leave blank for today.'
        required: false
        type: string
      skip_fetch:
        description: 'Skip API fetches (reprocess only)'
        required: false
        type: boolean
        default: false

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests python-dotenv numpy

    - name: Create .env file
      run: |
        echo "BALLDONTLIE_API_KEY=${{ secrets.BALLDONTLIE_API_KEY }}" > .env

    - name: Run ETL Pipeline
      run: |
        ARGS=""
        if [ -n "${{ inputs.target_date }}" ]; then
          ARGS="${{ inputs.target_date }}"
        fi
        if [ "${{ inputs.skip_fetch }}" = "true" ]; then
          ARGS="$ARGS --skip-fetch"
        fi
        python etl.py $ARGS

    - name: Generate predictions JSON
      run: python generate_predictions_json.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -A data/2026_data/ training-set/training_set.csv predictions.json predictions_history.json
        git diff --cached --quiet || (git commit -m "🤖 Daily ETL update $(date -u +%Y-%m-%d)" && git push)