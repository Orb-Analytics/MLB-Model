name: Run Selected Notebooks

on:
  push:
    paths:
      - 'notebooks/mlb-api.ipynb'
      - 'notebooks/novig-api.ipynb'
      - 'notebooks/pitchers.ipynb'
      - 'notebooks/web-scrape.ipynb'
  schedule:
    - cron: '30 16 * * *'  # 9:30 AM PT / 12:30 PM ET / 16:30 UTC
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nbconvert nbformat ipykernel jupyter

    - name: Run selected notebooks
      working-directory: ${{ github.workspace }}
      run: |
        for nb in notebooks/mlb-api.ipynb notebooks/novig-api.ipynb notebooks/pitchers.ipynb notebooks/web-scrape.ipynb; do
          echo "▶️ Running $nb"
          jupyter nbconvert --to notebook --execute "$nb" --output "$(basename "$nb")" --ExecutePreprocessor.timeout=300 || exit 1
        done

    - name: Check for CSV changes
      id: git-check
      run: |
        git add data/**/*.csv training-data/**/*.csv
        git diff --cached --quiet || echo "changes=true" >> $GITHUB_OUTPUT

    - name: Commit and push new CSVs
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git commit -m "🤖 Update CSVs from scheduled notebook run"
        git push
