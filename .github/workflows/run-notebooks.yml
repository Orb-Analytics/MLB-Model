name: Run Daily MLB Notebooks

on:
  schedule:
    - cron: '0 16 * * *'  # Runs at 9AM PT daily (16:00 UTC)
  workflow_dispatch:      # Manual trigger option

jobs:
  run-notebooks:
    runs-on: ubuntu-22.04  # Force stable Ubuntu version

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🐍 Verify Python Version
        run: python --version

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install papermill ipykernel

      - name: 🚀 Run notebooks (excluding statsapi & training-set)
        run: |
          echo "🔍 Running all notebooks except excluded ones..."
          for nb in $(find . -name "*.ipynb" ! -path "./.ipynb_checkpoints/*"); do
            if [[ "$nb" == *"statsapi.ipynb" || "$nb" == *"training-set.ipynb" ]]; then
              echo "⏭️ Skipping $nb"
            else
              echo "📘 Executing $nb"
              papermill "$nb" "$nb" --execution-timeout 600
            fi
          done
