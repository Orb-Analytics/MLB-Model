name: Run Notebooks

on:
  push:
    paths:
      - 'notebooks/**/*.ipynb'
      - 'training-data/**/*.ipynb'
  schedule:
    - cron: '30 13 * * *'  # 9:30 AM ET (13:30 UTC)
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nbconvert nbformat ipykernel jupyter

    - name: Run notebooks (excluding training-set.ipynb)
      working-directory: ${{ github.workspace }}
      run: |
        find notebooks training-data -name "*.ipynb" ! -name "training-set.ipynb" | while read nb; do
          echo "▶️ Running $nb"
          jupyter nbconvert --to notebook --execute "$nb" --output "$nb" --ExecutePreprocessor.timeout=300 || exit 1
        done
