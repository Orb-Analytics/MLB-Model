name: Run Daily MLB Notebooks

on:
  schedule:
    - cron: '0 16 * * *'  # 9AM Pacific = 16:00 UTC
  workflow_dispatch:      # Allow manual runs from GitHub UI

jobs:
  run-notebooks:
    runs-on: ubuntu-22.04

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # Updated for torch/ipython compatibility

      - name: 🚀 Install and run notebooks
        run: |
          echo "📦 Installing dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install papermill ipykernel

          echo "🔍 Looking for notebooks..."
          find . -name "*.ipynb" ! -path "./.ipynb_checkpoints/*"

          echo "🔁 Executing notebooks..."
          for nb in $(find . -name "*.ipynb" ! -path "./.ipynb_checkpoints/*"); do
            if [[ "$nb" == *"statsapi.ipynb" || "$nb" == *"training-set.ipynb" || "$nb" == *"mlb-api.ipynb" ]]; then
              echo "⏭️ Skipping $nb"
            else
              echo "📘 Running $nb"
              python -m papermill "$nb" "$nb" --execution-timeout 300 || echo "❌ Failed: $nb"
            fi
          done
