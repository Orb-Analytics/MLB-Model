name: Run Daily MLB Notebooks

on:
  schedule:
    - cron: '0 16 * * *'  # 9AM Pacific = 16:00 UTC (9AM Pacific Time)
  workflow_dispatch:

jobs:
  run-notebooks:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install papermill ipykernel

      - name: 🚀 Run all notebooks
        run: |
          echo "🔍 Looking for notebooks..."
          for nb in $(find . -name "*.ipynb" ! -path "./.ipynb_checkpoints/*"); do
            echo "📘 Running $nb"
            papermill "$nb" "$nb"
          done

      - name: 📝 Commit CSV results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.csv'
          if git diff --cached --quiet; then
            echo "✅ No CSV changes to commit."
          else
            echo "📄 CSV changes found — committing..."
            git commit -m "📊 Auto-update CSV outputs - $(date -u +"%Y-%m-%d %H:%M:%S")"
            git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
