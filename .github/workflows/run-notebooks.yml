name: Run Daily MLB Notebooks

on:
  schedule:
    - cron: '0 16 * * *'  # 9AM Pacific Time
  workflow_dispatch:

jobs:
  run-notebooks:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install papermill ipykernel nbformat

      - name: 🔍 Find and Run Notebooks
        run: |
          echo "🔍 Looking for notebooks..."
          for nb in $(find . -name "*.ipynb" ! -path "./.ipynb_checkpoints/*"); do
            echo "📘 Running $nb"
            papermill "$nb" "$nb"
          done

      - name: 📤 Commit and Push CSV Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "📊 Auto-update CSV outputs - $(date -u '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
