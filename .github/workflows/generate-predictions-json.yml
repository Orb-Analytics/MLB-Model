name: Generate Predictions JSON

on:
  workflow_run:
    workflows: ["Send MLB Predictions Email"]
    types: [completed]

  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull latest changes
      run: git pull origin main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy

    - name: Generate predictions JSON
      run: python generate_predictions_json.py

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add predictions.json predictions_history.json
        git diff --staged --quiet || git commit -m "🤖 Update predictions JSON $(date -u +%Y-%m-%d)"
        git push